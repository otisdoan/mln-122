<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1a227f",
              success: "#22c55e",
              "background-light": "#f6f6f8",
              "background-dark": "#121320",
            },
            fontFamily: {
              display: ["Lexend"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "1rem",
              xl: "1.5rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="w-full max-w-[480px] bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800"
    >
      <!-- Top Navigation -->
      <div class="flex items-center p-4 pb-2 justify-between">
        <button
          class="text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-full transition-colors"
        >
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h2
          class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center"
        >
          Tạo tài khoản mới
        </h2>
        <div class="w-10"></div>
        <!-- Spacer for centering -->
      </div>
      <div class="px-6 pt-8 pb-4 text-center">
        <div
          class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-primary/10 mb-6"
        >
          <span class="material-symbols-outlined text-primary text-4xl"
            >person_add</span
          >
        </div>
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">
          Mô Phỏng Giá Trị Thặng Dư
        </h1>
        <p class="text-slate-500 dark:text-slate-400">
          Tham gia cùng chúng tôi để bắt đầu mô phỏng và phân tích
        </p>
      </div>
      <div class="px-6 py-4 space-y-4">
        <!-- Tên người dùng -->
        <div class="flex flex-col gap-2">
          <label
            class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1"
            >Tên người dùng</label
          >
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
            >
              <span
                class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors"
                >person</span
              >
            </div>
            <input
              class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-400"
              placeholder="Nhập họ và tên đầy đủ"
              type="text"
            />
          </div>
        </div>
        <!-- Email -->
        <div class="flex flex-col gap-2">
          <label
            class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1"
            >Email</label
          >
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
            >
              <span
                class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors"
                >mail</span
              >
            </div>
            <input
              class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-400"
              placeholder="example@gmail.com"
              type="email"
            />
          </div>
        </div>
        <!-- Mật khẩu -->
        <div class="flex flex-col gap-2">
          <label
            class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1"
            >Mật khẩu</label
          >
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
            >
              <span
                class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors"
                >lock</span
              >
            </div>
            <input
              class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-400"
              placeholder="Nhập mật khẩu ít nhất 8 ký tự"
              type="password"
            />
            <button
              class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600"
            >
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>
        <!-- Xác nhận mật khẩu -->
        <div class="flex flex-col gap-2">
          <label
            class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1"
            >Xác nhận mật khẩu</label
          >
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
            >
              <span
                class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors"
                >lock_reset</span
              >
            </div>
            <input
              class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-400"
              placeholder="Nhập lại mật khẩu"
              type="password"
            />
          </div>
        </div>
        <!-- Nút Tạo tài khoản -->
        <div class="pt-4">
          <button
            class="w-full bg-success hover:bg-success/90 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg shadow-success/20 active:scale-[0.98] text-lg"
          >
            Tạo tài khoản
          </button>
        </div>
        <!-- Footer Links -->
        <div class="py-6 text-center">
          <p class="text-slate-600 dark:text-slate-400">
            Đã có tài khoản?
            <a
              class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1"
              href="#"
              >Đăng nhập ngay</a
            >
          </p>
        </div>
      </div>
      <!-- Decorative Pattern at the bottom -->
      <div
        class="h-2 w-full bg-gradient-to-r from-primary via-success to-primary"
      ></div>
    </div>
    <!-- Background Decoration -->
    <div
      class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden opacity-20 pointer-events-none"
    >
      <div
        class="absolute -top-24 -left-24 w-96 h-96 bg-primary rounded-full blur-3xl"
      ></div>
      <div
        class="absolute -bottom-24 -right-24 w-96 h-96 bg-success rounded-full blur-3xl"
      ></div>
    </div>
  </body>
</html>
