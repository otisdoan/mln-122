<!doctype html>

<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1a227f",
              "background-light": "#f6f6f8",
              "background-dark": "#121320",
            },
            fontFamily: {
              display: ["Lexend"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "1rem",
              xl: "1.5rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <title>Thi đấu PvP - Mô Phỏng Giá Trị Thặng Dư</title>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100"
  >
    <div
      class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-2xl overflow-x-hidden"
    >
      <!-- Header: PvP Match Info -->
      <div
        class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-primary/10 justify-between sticky top-0 z-10"
      >
        <div
          class="text-primary dark:text-primary/80 flex size-10 shrink-0 items-center justify-center cursor-pointer"
        >
          <span class="material-symbols-outlined">close</span>
        </div>
        <div class="flex flex-col items-center">
          <h2
            class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight"
          >
            Thách đấu PvP
          </h2>
          <span
            class="text-[10px] font-bold text-primary uppercase tracking-widest"
            >Vòng 3/10</span
          >
        </div>
        <div class="flex w-10 items-center justify-end">
          <div class="text-amber-500">
            <span class="material-symbols-outlined">trophy</span>
          </div>
        </div>
      </div>
      <!-- Scoreboard & Versus Section -->
      <div
        class="flex flex-col px-4 py-6 bg-gradient-to-b from-primary/5 to-transparent"
      >
        <div class="flex items-center justify-between gap-4">
          <!-- Player 1 (User) -->
          <div class="flex flex-col items-center flex-1 gap-2">
            <div class="relative">
              <div
                class="size-20 rounded-full border-4 border-primary bg-primary/20 overflow-hidden shadow-lg"
              >
                <img
                  class="w-full h-full object-cover"
                  data-alt="Avatar của người chơi hiện tại"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuDwKfIUdUAWy14whFSFlfXlGTxkQjNVV3JrJshlD7MGOaNNu0VBPCJc12zUA1cCXcXFoq0ybLd-lzdbZ6GvuiVS_qOrE1faqzt9NL5JIWVVC7Axn9wU81gp_5Jj0OytbPQhy4n2XWBQCEOK1S0SAkcVR49y3G_uqzMRMCOaCi4okTdZVPtM-SlGz9y2hr7R8L3f5r9cc5J1N02eWB6bIjJDoCjM0NU5W899Gmyh2LVpA0k7k0dSeh3vqEI_aeGkSLh-hNhZMklTX_c"
                />
              </div>
              <div
                class="absolute -bottom-1 -right-1 bg-green-500 size-5 rounded-full border-2 border-white"
              ></div>
            </div>
            <p class="text-xs font-semibold text-slate-500 uppercase">Bạn</p>
            <p class="text-3xl font-extrabold text-primary">1,250</p>
          </div>
          <!-- VS Badge -->
          <div class="flex flex-col items-center">
            <div
              class="bg-primary text-white font-black italic px-3 py-1 rounded-lg transform -skew-x-12 shadow-md"
            >
              VS
            </div>
            <div class="h-12 w-[2px] bg-primary/20 my-2"></div>
          </div>
          <!-- Player 2 (Opponent) -->
          <div class="flex flex-col items-center flex-1 gap-2">
            <div class="relative">
              <div
                class="size-20 rounded-full border-4 border-rose-500 bg-rose-100 overflow-hidden shadow-lg"
              >
                <img
                  class="w-full h-full object-cover"
                  data-alt="Avatar của đối thủ thi đấu"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmWiL0NEDl3lGAAmH4IQ1rYCDDF-8KVH7koBrDhtcW06wAy3Ia-AhQyd6E5nlndPczgje46gIzsrlkBlqTrJolUjyh_aeg1Kyk8O8zTNVjy4dWABwGV6Y5rnO36SVF6Ks-OYXKBHOThnFRD5yeveUv_gaqIeABcw9-8QAYC4JcI2wAZGGbliqTLbc0s15fzPgj_H7VZ924oSpEDFqyLYqMt7Ygfu9P_Z8r7rzMEgawq6z6P98ml2kMoXQsO2nZfGfR8IO9MZQGOmk"
                />
              </div>
              <div
                class="absolute -bottom-1 -right-1 bg-green-500 size-5 rounded-full border-2 border-white"
              ></div>
            </div>
            <p class="text-xs font-semibold text-slate-500 uppercase">
              Đối thủ
            </p>
            <p class="text-3xl font-extrabold text-rose-600">980</p>
          </div>
        </div>
      </div>
      <!-- Timer Section -->
      <div class="flex flex-col gap-2 px-6 py-2">
        <div class="flex justify-between items-end">
          <span
            class="text-xs font-bold text-slate-400 uppercase tracking-tighter"
            >Thời gian suy nghĩ</span
          >
          <span class="text-xl font-black text-primary tabular-nums">14s</span>
        </div>
        <div
          class="h-3 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden border border-white dark:border-slate-700"
        >
          <div
            class="h-full bg-gradient-to-r from-primary to-blue-400 rounded-full transition-all duration-1000"
            style="width: 70%"
          ></div>
        </div>
      </div>
      <!-- Question Section -->
      <div class="flex-1 flex flex-col p-6 mt-2">
        <div
          class="bg-white dark:bg-slate-900 rounded-xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 relative overflow-hidden"
        >
          <div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
          <p
            class="text-slate-800 dark:text-slate-100 text-lg font-semibold leading-relaxed"
          >
            Theo C.Mác, bộ phận vốn nào dùng để mua sức lao động và có sự thay
            đổi về lượng trong quá trình sản xuất?
          </p>
        </div>
        <!-- Answer Buttons Grid -->
        <div class="grid grid-cols-1 gap-3 mt-8">
          <button
            class="flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary hover:bg-primary/5 transition-all text-left group"
          >
            <span
              class="size-10 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 font-bold group-hover:bg-primary group-hover:text-white"
              >A</span
            >
            <span class="text-slate-700 dark:text-slate-200 font-medium"
              >Tư bản bất biến (c)</span
            >
          </button>
          <button
            class="flex items-center gap-4 p-4 rounded-xl border-2 border-primary bg-primary/5 transition-all text-left group ring-2 ring-primary/20"
          >
            <span
              class="size-10 flex items-center justify-center rounded-lg bg-primary text-white font-bold"
              >B</span
            >
            <span class="text-slate-900 dark:text-white font-bold"
              >Tư bản khả biến (v)</span
            >
          </button>
          <button
            class="flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary hover:bg-primary/5 transition-all text-left group"
          >
            <span
              class="size-10 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 font-bold group-hover:bg-primary group-hover:text-white"
              >C</span
            >
            <span class="text-slate-700 dark:text-slate-200 font-medium"
              >Tư bản cố định</span
            >
          </button>
          <button
            class="flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary hover:bg-primary/5 transition-all text-left group"
          >
            <span
              class="size-10 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 font-bold group-hover:bg-primary group-hover:text-white"
              >D</span
            >
            <span class="text-slate-700 dark:text-slate-200 font-medium"
              >Giá trị thặng dư (m)</span
            >
          </button>
        </div>
      </div>
      <!-- Opponent Status -->
      <div class="px-6 py-4 flex justify-center">
        <div
          class="flex items-center gap-2 bg-rose-50 dark:bg-rose-900/20 px-4 py-2 rounded-full border border-rose-100 dark:border-rose-900/30"
        >
          <span class="relative flex h-3 w-3">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"
            ></span>
            <span
              class="relative inline-flex rounded-full h-3 w-3 bg-rose-500"
            ></span>
          </span>
          <span class="text-xs font-bold text-rose-600 dark:text-rose-400"
            >Đối thủ đang suy nghĩ...</span
          >
        </div>
      </div>
      <!-- Bottom Navigation Bar (Modified for Play State) -->
      <div
        class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-6 pt-3"
      >
        <div class="flex gap-2">
          <a
            class="flex flex-1 flex-col items-center justify-center gap-1 rounded-xl py-2 text-primary"
            href="#"
          >
            <span class="material-symbols-outlined fill-[1]">chat_bubble</span>
            <span class="text-[10px] font-bold">Chat</span>
          </a>
          <a
            class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-slate-400"
            href="#"
          >
            <span class="material-symbols-outlined">mic</span>
            <span class="text-[10px] font-bold">Thoại</span>
          </a>
          <a
            class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-slate-400"
            href="#"
          >
            <span class="material-symbols-outlined">lightbulb</span>
            <span class="text-[10px] font-bold">Gợi ý</span>
          </a>
          <a
            class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-slate-400"
            href="#"
          >
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-bold">Cài đặt</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
