<!doctype html>

<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1a227f",
              "background-light": "#f6f6f8",
              "background-dark": "#121320",
            },
            fontFamily: {
              display: ["Lexend"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "1rem",
              xl: "1.5rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Lexend", sans-serif;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col"
  >
    <!-- Header Navigation -->
    <header
      class="flex items-center bg-white dark:bg-slate-900 p-4 sticky top-0 z-10 shadow-sm"
    >
      <div
        class="text-primary flex size-10 items-center justify-center rounded-full bg-primary/10"
      >
        <span class="material-symbols-outlined">close</span>
      </div>
      <div class="flex-1 text-center">
        <h2
          class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight"
        >
          Kinh tế Chính trị
        </h2>
        <p class="text-xs text-slate-500 font-medium">
          Chương 3: Giá trị thặng dư
        </p>
      </div>
      <div
        class="flex size-10 items-center justify-center rounded-full bg-yellow-100 text-yellow-700"
      >
        <span class="material-symbols-outlined text-[20px]">lightbulb</span>
      </div>
    </header>
    <!-- Progress & Timer Section -->
    <main class="flex-1 flex flex-col p-4 gap-6 max-w-2xl mx-auto w-full">
      <div class="flex flex-col gap-3">
        <div class="flex justify-between items-end">
          <div class="flex flex-col">
            <span
              class="text-slate-500 text-xs font-semibold uppercase tracking-wider"
              >Tiến độ</span
            >
            <p class="text-primary dark:text-primary text-xl font-bold">
              Câu 3 <span class="text-slate-400 font-medium">/ 10</span>
            </p>
          </div>
          <div
            class="flex items-center gap-2 bg-primary/5 dark:bg-primary/20 px-4 py-2 rounded-xl border border-primary/10"
          >
            <span class="material-symbols-outlined text-primary animate-pulse"
              >timer</span
            >
            <div class="flex items-baseline gap-1">
              <span class="text-primary font-bold text-lg">01:30</span>
            </div>
          </div>
        </div>
        <div
          class="h-3 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden"
        >
          <div class="h-full bg-primary rounded-full" style="width: 30%"></div>
        </div>
      </div>
      <!-- Question Card -->
      <div
        class="bg-white dark:bg-slate-900 rounded-xl p-6 shadow-md border border-slate-100 dark:border-slate-800 flex flex-col items-center text-center gap-4"
      >
        <div
          class="size-12 bg-primary/10 rounded-full flex items-center justify-center text-primary"
        >
          <span class="material-symbols-outlined text-3xl">help_outline</span>
        </div>
        <h3
          class="text-slate-900 dark:text-white text-xl md:text-2xl font-bold leading-snug"
        >
          Giá trị thặng dư siêu ngạch là gì?
        </h3>
      </div>
      <!-- Answer Options -->
      <div class="flex flex-col gap-3">
        <button
          class="group flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary hover:bg-primary/5 transition-all text-left"
        >
          <div
            class="size-10 flex shrink-0 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 group-hover:bg-primary group-hover:text-white font-bold transition-colors"
          >
            A
          </div>
          <p class="text-slate-700 dark:text-slate-300 font-medium">
            Là phần giá trị thặng dư thu được do tăng năng suất lao động cá
            biệt.
          </p>
        </button>
        <button
          class="group flex items-center gap-4 p-4 rounded-xl border-2 border-primary bg-primary/5 dark:bg-primary/10 transition-all text-left"
        >
          <div
            class="size-10 flex shrink-0 items-center justify-center rounded-lg bg-primary text-white font-bold"
          >
            B
          </div>
          <p class="text-primary dark:text-white font-bold">
            Là phần giá trị thặng dư thu được do kéo dài ngày lao động.
          </p>
          <span class="material-symbols-outlined ml-auto text-primary"
            >check_circle</span
          >
        </button>
        <button
          class="group flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary hover:bg-primary/5 transition-all text-left"
        >
          <div
            class="size-10 flex shrink-0 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 group-hover:bg-primary group-hover:text-white font-bold transition-colors"
          >
            C
          </div>
          <p class="text-slate-700 dark:text-slate-300 font-medium">
            Là phần giá trị thặng dư thu được do tăng cường độ lao động.
          </p>
        </button>
        <button
          class="group flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary hover:bg-primary/5 transition-all text-left"
        >
          <div
            class="size-10 flex shrink-0 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 group-hover:bg-primary group-hover:text-white font-bold transition-colors"
          >
            D
          </div>
          <p class="text-slate-700 dark:text-slate-300 font-medium">
            Là hình thái biến tướng của giá trị thặng dư tuyệt đối.
          </p>
        </button>
      </div>
    </main>
    <!-- Bottom Action Bar -->
    <footer
      class="mt-auto bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 p-4 flex gap-4"
    >
      <button
        class="flex-1 py-4 px-6 rounded-xl border-2 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 font-bold hover:bg-slate-50 transition-colors"
      >
        Quay lại
      </button>
      <button
        class="flex-[2] py-4 px-6 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity flex items-center justify-center gap-2"
      >
        Câu tiếp theo
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </footer>
    <!-- Tab Bar -->
    <div
      class="flex gap-2 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-4 pt-2"
    >
      <a
        class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400"
        href="#"
      >
        <div class="flex h-8 items-center justify-center">
          <span class="material-symbols-outlined">home</span>
        </div>
        <p class="text-[10px] font-medium leading-normal">Trang chủ</p>
      </a>
      <a
        class="flex flex-1 flex-col items-center justify-end gap-1 text-primary"
        href="#"
      >
        <div class="flex h-8 items-center justify-center">
          <span
            class="material-symbols-outlined"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >menu_book</span
          >
        </div>
        <p class="text-[10px] font-bold leading-normal">Học tập</p>
      </a>
      <a
        class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400"
        href="#"
      >
        <div class="flex h-8 items-center justify-center">
          <span class="material-symbols-outlined">leaderboard</span>
        </div>
        <p class="text-[10px] font-medium leading-normal">Bảng xếp hạng</p>
      </a>
      <a
        class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400"
        href="#"
      >
        <div class="flex h-8 items-center justify-center">
          <span class="material-symbols-outlined">person</span>
        </div>
        <p class="text-[10px] font-medium leading-normal">Cá nhân</p>
      </a>
    </div>
  </body>
</html>
